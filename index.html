<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TORN // Inactive Player Hunter</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --bg2: #0f1318;
    --panel: #131820;
    --border: #1e2a38;
    --accent: #ff3c3c;
    --accent2: #ff7b00;
    --green: #00e676;
    --yellow: #ffd600;
    --blue: #29b6f6;
    --text: #c8d8e8;
    --muted: #4a6070;
    --hosp: #ff3c3c;
    --jail: #ffd600;
    --okay: #00e676;
    --travel: #29b6f6;
    --federal: #ff7b00;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { font-size: 14px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG scanlines */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
    pointer-events: none; z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* Header */
  header {
    text-align: center;
    padding: 30px 0 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(255,60,60,0.5);
  }
  header h1 span { color: var(--text); }
  header p { color: var(--muted); font-size: 0.8rem; margin-top: 6px; letter-spacing: 0.1em; }

  /* API Key Section */
  .api-bar {
    display: flex; gap: 10px; align-items: center;
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 14px 18px;
    margin-bottom: 20px;
  }
  .api-bar label { color: var(--muted); font-size: 0.78rem; letter-spacing: 0.1em; white-space: nowrap; }
  .api-bar input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-bar input:focus { border-color: var(--accent); }
  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 9px 20px;
    border: none; cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: #ff5555; box-shadow: 0 0 20px rgba(255,60,60,0.4); }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .stat-chip {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 6px 14px;
    font-size: 0.75rem;
    letter-spacing: 0.08em;
  }
  .stat-chip span { font-family: 'Orbitron', sans-serif; font-weight: 700; margin-left: 6px; }
  .stat-chip.s-ok span { color: var(--green); }
  .stat-chip.s-hosp span { color: var(--hosp); }
  .stat-chip.s-jail span { color: var(--yellow); }
  .stat-chip.s-travel span { color: var(--blue); }
  .stat-chip.s-total span { color: var(--accent2); }

  /* Filter row */
  .filter-row {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .filter-row input[type="text"] {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.82rem;
    padding: 7px 12px;
    outline: none;
    width: 200px;
  }
  .filter-row input[type="text"]:focus { border-color: var(--blue); }
  .filter-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    padding: 7px 14px;
    border: 1px solid var(--border);
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: all 0.15s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: currentColor; }
  .filter-btn.f-all.active { color: var(--text); border-color: var(--text); }
  .filter-btn.f-okay.active { color: var(--green); border-color: var(--green); background: rgba(0,230,118,0.07); }
  .filter-btn.f-hosp.active { color: var(--hosp); border-color: var(--hosp); background: rgba(255,60,60,0.07); }
  .filter-btn.f-jail.active { color: var(--yellow); border-color: var(--yellow); background: rgba(255,214,0,0.07); }
  .filter-btn.f-travel.active { color: var(--blue); border-color: var(--blue); background: rgba(41,182,246,0.07); }

  /* Progress bar */
  .progress-wrap {
    margin-bottom: 14px;
    display: none;
  }
  .progress-wrap.show { display: block; }
  .progress-label { font-size: 0.72rem; color: var(--muted); margin-bottom: 5px; letter-spacing: 0.08em; }
  .progress-track {
    height: 4px; background: var(--border); position: relative;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s;
    box-shadow: 0 0 10px var(--accent);
    width: 0%;
  }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table {
    width: 100%; border-collapse: collapse;
    font-size: 0.82rem;
  }
  thead th {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 10px 14px;
    text-align: left;
    font-family: 'Orbitron', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th.sort-asc::after { content: ' ▲'; color: var(--accent); }
  thead th.sort-desc::after { content: ' ▼'; color: var(--accent); }
  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:hover { background: rgba(255,255,255,0.03); }
  tbody td { padding: 10px 14px; border-left: 1px solid var(--border); vertical-align: middle; }
  tbody td:first-child { border-left: none; }

  .col-num { color: var(--muted); width: 40px; text-align: center; }
  .col-name { font-weight: 600; }
  .col-name a { color: var(--blue); text-decoration: none; }
  .col-name a:hover { text-decoration: underline; }
  .col-id { color: var(--muted); }
  .col-level { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.85rem; }
  .col-status { max-width: 300px; }
  .col-last { white-space: nowrap; }
  .col-action { white-space: nowrap; }

  /* Status badges */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    font-size: 0.7rem;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 0.08em;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .badge-ok { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
  .badge-hosp { background: rgba(255,60,60,0.15); color: var(--hosp); border: 1px solid rgba(255,60,60,0.3); }
  .badge-jail { background: rgba(255,214,0,0.15); color: var(--yellow); border: 1px solid rgba(255,214,0,0.3); }
  .badge-travel { background: rgba(41,182,246,0.15); color: var(--blue); border: 1px solid rgba(41,182,246,0.3); }
  .badge-federal { background: rgba(255,123,0,0.15); color: var(--federal); border: 1px solid rgba(255,123,0,0.3); }
  .badge-unknown { background: rgba(100,100,100,0.15); color: var(--muted); border: 1px solid rgba(100,100,100,0.3); }

  .status-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* Attack button */
  .btn-attack {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 6px 14px;
    background: var(--accent);
    color: #fff;
    border: none; cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: all 0.15s;
    text-transform: uppercase;
  }
  .btn-attack:hover { background: #ff5555; box-shadow: 0 0 15px rgba(255,60,60,0.5); }

  /* Loading dots */
  .loading {
    display: inline-block;
    width: 60px; text-align: left;
    color: var(--muted);
    font-size: 0.8rem;
  }
  .loading::after {
    content: '';
    animation: dots 1s infinite;
  }
  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
  }

  .error-cell { color: var(--accent); font-size: 0.75rem; }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 60px;
    color: var(--muted);
  }
  .empty p { font-size: 0.85rem; margin-top: 8px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); }
  ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

  @media (max-width: 600px) {
    header h1 { font-size: 1.3rem; }
    .api-bar { flex-wrap: wrap; }
    .api-bar input { min-width: 0; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>TORN <span>//</span> INACTIVE HUNTER</h1>
    <p>INACTIVE PLAYER ATTACK DASHBOARD &nbsp;|&nbsp; 125 TARGETS LOADED</p>
  </header>

  <!-- API Key Bar -->
  <div class="api-bar">
    <label>API KEY //</label>
    <input type="password" id="apiKey" placeholder="Enter your Torn API key..." autocomplete="off">
    <button class="btn btn-primary" id="fetchBtn" onclick="fetchAll()">▶ SCAN ALL</button>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-chip s-total">TOTAL <span id="s-total">0</span></div>
    <div class="stat-chip s-ok">OKAY <span id="s-ok">0</span></div>
    <div class="stat-chip s-hosp">HOSPITAL <span id="s-hosp">0</span></div>
    <div class="stat-chip s-jail">JAIL <span id="s-jail">0</span></div>
    <div class="stat-chip s-travel">TRAVELING <span id="s-travel">0</span></div>
  </div>

  <!-- Filter Row -->
  <div class="filter-row">
    <input type="text" id="searchBox" placeholder="Search name or ID..." oninput="applyFilters()">
    <button class="filter-btn f-all active" onclick="setFilter('all', this)">ALL</button>
    <button class="filter-btn f-okay" onclick="setFilter('okay', this)">✓ OKAY</button>
    <button class="filter-btn f-hosp" onclick="setFilter('hosp', this)">✚ HOSPITAL</button>
    <button class="filter-btn f-jail" onclick="setFilter('jail', this)">⚑ JAIL</button>
    <button class="filter-btn f-travel" onclick="setFilter('travel', this)">✈ TRAVEL</button>
  </div>

  <!-- Progress -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">SCANNING 0 / 125</div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  </div>

  <!-- Table -->
  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th class="col-num">#</th>
          <th onclick="sortBy('name')"">NAME</th>
          <th onclick="sortBy('id')">ID</th>
          <th onclick="sortBy('level')">LVL</th>
          <th>STATUS</th>
          <th onclick="sortBy('lastAction')">LAST ACTIVE</th>
          <th>ACTION</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

</div>

<script>
const PLAYERS = [{"name":"maverick1972","id":522960},{"name":"OwlByNite","id":1046495},{"name":"Dragon_Reborn","id":234429},{"name":"babymolly","id":879148},{"name":"matt007","id":298167},{"name":"themastercheif","id":566484},{"name":"warriorscode","id":738073},{"name":"mikeycallin1","id":659852},{"name":"DevilsBlood","id":76096},{"name":"soldierx","id":153910},{"name":"ilekilluall8","id":316768},{"name":"raysil","id":796316},{"name":"nathwin","id":1379450},{"name":"wilash","id":807823},{"name":"iBennett","id":472351},{"name":"james2503","id":476620},{"name":"srfshannon","id":581300},{"name":"theking99218","id":1399310},{"name":"ckirklin","id":485156},{"name":"Bob_the_butler","id":1199189},{"name":"heva07","id":454302},{"name":"nemesis2000","id":191060},{"name":"Boylinger","id":669996},{"name":"Aceraven","id":1489357},{"name":"Darkstar123","id":1269587},{"name":"artsmart020","id":1306114},{"name":"xXDannyBoiiXx","id":567611},{"name":"cascao","id":888467},{"name":"killer133","id":983314},{"name":"LilPimpinjr","id":44940},{"name":"evil-one","id":590277},{"name":"lowlaynsten","id":586812},{"name":"silverwings19","id":587991},{"name":"sidmire","id":178235},{"name":"JoeCool555","id":656275},{"name":"jackiboi2k8","id":969920},{"name":"DJJR","id":719349},{"name":"AnnabellLee","id":627612},{"name":"dj95","id":646007},{"name":"mroq","id":318410},{"name":"-SasukeUchiha-","id":556637},{"name":"transvaaler","id":1199867},{"name":"xVx-Assassin","id":853558},{"name":"lordzenn","id":475911},{"name":"natashamarie","id":993561},{"name":"killatrone_4000","id":861978},{"name":"agreaves","id":1265642},{"name":"4fingers","id":670186},{"name":"maxrocks","id":352232},{"name":"mzwpunk","id":1104804},{"name":"Monica","id":659243},{"name":"Dragon721","id":542048},{"name":"yaesu001","id":353299},{"name":"63476","id":63476},{"name":"scottywalker","id":595042},{"name":"K00L-","id":693146},{"name":"nuryn","id":652570},{"name":"phyzco","id":247701},{"name":"RockinGamer","id":591855},{"name":"Misspriss","id":456008},{"name":"Adam12321","id":508367},{"name":"CdWilliams101","id":172402},{"name":"Miff99","id":507739},{"name":"green_punk768","id":534510},{"name":"kashmoney","id":938020},{"name":"ptownboi04","id":509029},{"name":"zapman119","id":239449},{"name":"lucy1011","id":1073189},{"name":"melinko","id":323067},{"name":"pimpin","id":577479},{"name":"SEXYPERSON101","id":916404},{"name":"guppy12345","id":490998},{"name":"omgitswill","id":298602},{"name":"Nikon","id":96674},{"name":"hoangnhu","id":469387},{"name":"Mijumaru","id":238623},{"name":"Pyrogod","id":678613},{"name":"leeroydon","id":671763},{"name":"Richev12","id":982909},{"name":"Mattyea","id":428350},{"name":"weerossy","id":579753},{"name":"smw23","id":1413853},{"name":"shaun103","id":693966},{"name":"nature95boy","id":894666},{"name":"ken-XXX","id":921628},{"name":"mrman","id":580371},{"name":"mavinny","id":677104},{"name":"wayneker","id":525298},{"name":"Marine2015","id":790460},{"name":"Joshuaaare","id":582138},{"name":"omoroxs","id":1101484},{"name":"When7Meets7","id":342880},{"name":"CHRIS382","id":904225},{"name":"Jonny4toes","id":512249},{"name":"qwertypoo","id":313327},{"name":"MRFoxtrot","id":849660},{"name":"bighorse","id":857866},{"name":"fredmonkey","id":648698},{"name":"slykid","id":581343},{"name":"hisham654","id":422145},{"name":"nickp36","id":1171459},{"name":"tnm021","id":794755},{"name":"joshymitty","id":1022737},{"name":"sLiPkNoTbOy","id":497977},{"name":"Hass101","id":974933},{"name":"fredie","id":524902},{"name":"samartin","id":685929},{"name":"tutan","id":1389629},{"name":"livehere","id":969780},{"name":"djyoda","id":750371},{"name":"DarthZannah","id":555271},{"name":"cooterjessie","id":367428},{"name":"Foxy-Roxy04","id":1169008},{"name":"Febreeze","id":935251},{"name":"dannieex","id":430140},{"name":"Frozenmalice","id":789256},{"name":"dillin1333","id":1183664},{"name":"forgotten_mists","id":296249},{"name":"dick646","id":870109},{"name":"dmora","id":1075217},{"name":"gogo234","id":1423394},{"name":"aaronyuan","id":901426},{"name":"fathead","id":1394290},{"name":"Braskius","id":430622},{"name":"Footballman12","id":552906}];

// Fix any bad entries
const players = PLAYERS.map(p => ({
  name: p.name || Object.keys(p).find(k => k !== 'id') || '???',
  id: p.id
}));

let playerData = players.map(p => ({ ...p, level: null, statusState: null, statusDesc: null, lastAction: null, lastRelative: null, hospitalUntil: 0, jailUntil: 0, loaded: false, error: false }));
let currentFilter = 'all';
let sortCol = null;
let sortDir = 1;
let fetching = false;

// Init table with loading state
function initTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = players.map((p, i) => rowHTML(i)).join('');
}

function rowHTML(i) {
  const p = playerData[i];
  const name = p.name || '???';
  const id = p.id;

  let levelCell = p.loaded ? `<span style="color:var(--accent2)">${p.level ?? '?'}</span>` : (p.error ? '<span class="error-cell">ERR</span>' : '<span class="loading"></span>');

  let statusCell = '';
  if (!p.loaded && !p.error) {
    statusCell = '<span class="loading"></span>';
  } else if (p.error) {
    statusCell = '<span class="error-cell">API Error</span>';
  } else {
    const state = (p.statusState || '').toLowerCase();
    let badgeClass = 'badge-unknown', badgeLabel = state.toUpperCase() || 'UNKNOWN';
    if (state === 'okay') { badgeClass = 'badge-ok'; badgeLabel = 'OKAY'; }
    else if (state === 'hospital') { badgeClass = 'badge-hosp'; badgeLabel = 'HOSPITAL'; }
    else if (state === 'jail') { badgeClass = 'badge-jail'; badgeLabel = 'JAIL'; }
    else if (state === 'traveling' || state === 'abroad') { badgeClass = 'badge-travel'; badgeLabel = 'TRAVELING'; }
    else if (state === 'federal') { badgeClass = 'badge-federal'; badgeLabel = 'FEDERAL'; }
    let timeLeft = '';
    const now = Math.floor(Date.now() / 1000);
    if (state === 'hospital' && p.hospitalUntil > now) {
      const secs = p.hospitalUntil - now;
      timeLeft = ` <span style="color:var(--accent);font-size:0.7rem">[${fmtTime(secs)}]</span>`;
    } else if (state === 'jail' && p.jailUntil > now) {
      const secs = p.jailUntil - now;
      timeLeft = ` <span style="color:var(--yellow);font-size:0.7rem">[${fmtTime(secs)}]</span>`;
    }
    statusCell = `<span class="badge ${badgeClass}">${badgeLabel}</span>${timeLeft}<div class="status-desc">${escHtml(p.statusDesc || '')}</div>`;
  }

  let lastCell = '';
  if (p.loaded) {
    lastCell = `<span style="color:var(--muted);font-size:0.75rem">${escHtml(p.lastRelative || '?')}</span>`;
  }

  return `<tr data-idx="${i}" data-state="${(p.statusState||'').toLowerCase()}" data-name="${name.toLowerCase()}" data-id="${id}">
    <td class="col-num">${i+1}</td>
    <td class="col-name"><a href="https://www.torn.com/profiles.php?XID=${id}" target="_blank">${escHtml(name)}</a></td>
    <td class="col-id">${id}</td>
    <td class="col-level">${levelCell}</td>
    <td class="col-status">${statusCell}</td>
    <td class="col-last">${lastCell}</td>
    <td class="col-action"><a class="btn-attack" href="https://www.torn.com/loader.php?sid=attack&user2ID=${id}" target="_blank">⚔ ATTACK</a></td>
  </tr>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function fetchAll() {
  const key = document.getElementById('apiKey').value.trim();
  if (!key) { alert('Please enter your API key first!'); return; }
  if (fetching) return;
  fetching = true;
  document.getElementById('fetchBtn').disabled = true;
  document.getElementById('fetchBtn').textContent = '⏳ SCANNING...';
  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('statsBar').style.display = 'flex';

  initTable();

  let done = 0;
  const BATCH = 5;

  async function fetchOne(i) {
    const p = players[i];
    try {
      const res = await fetch(`https://api.torn.com/user/${p.id}?selections=profile&key=${key}&comment=InactiveHunter`);
      const data = await res.json();
      if (data.error) throw new Error(data.error.error);
      playerData[i].level = data.level;
      playerData[i].statusState = data.status?.state || 'Unknown';
      playerData[i].statusDesc = data.status?.description || '';
      playerData[i].lastAction = data.last_action?.timestamp || 0;
      playerData[i].lastRelative = data.last_action?.relative || '';
      playerData[i].hospitalUntil = data.states?.hospital_timestamp || 0;
      playerData[i].jailUntil = data.states?.jail_timestamp || 0;
      playerData[i].loaded = true;
    } catch(e) {
      playerData[i].error = true;
    }
    done++;
    updateProgress(done);
    updateRow(i);
    updateStats();
  }

  // Process in batches
  for (let i = 0; i < players.length; i += BATCH) {
    const batch = [];
    for (let j = i; j < Math.min(i + BATCH, players.length); j++) batch.push(fetchOne(j));
    await Promise.all(batch);
    await sleep(600); // Rate limit respect
    autoSort();
  }

  fetching = false;
  document.getElementById('fetchBtn').disabled = false;
  document.getElementById('fetchBtn').textContent = '↺ RE-SCAN';
  document.getElementById('progressWrap').classList.remove('show');
  autoSort();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function updateProgress(done) {
  const pct = (done / players.length * 100).toFixed(1);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `SCANNING ${done} / ${players.length} — ${pct}%`;
}

function updateRow(i) {
  const tbody = document.getElementById('tableBody');
  const existing = tbody.querySelector(`tr[data-idx="${i}"]`);
  if (existing) {
    const newRow = document.createElement('tr');
    newRow.innerHTML = rowHTML(i).replace(/^<tr[^>]*>/, '').replace(/<\/tr>$/, '');
    // Replace by updating attrs + innerHTML
    existing.outerHTML = rowHTML(i);
  }
  applyFilters();
}

function updateStats() {
  const loaded = playerData.filter(p => p.loaded);
  const ok = loaded.filter(p => p.statusState?.toLowerCase() === 'okay').length;
  const hosp = loaded.filter(p => p.statusState?.toLowerCase() === 'hospital').length;
  const jail = loaded.filter(p => p.statusState?.toLowerCase() === 'jail').length;
  const travel = loaded.filter(p => ['traveling','abroad'].includes(p.statusState?.toLowerCase())).length;
  document.getElementById('s-total').textContent = loaded.length;
  document.getElementById('s-ok').textContent = ok;
  document.getElementById('s-hosp').textContent = hosp;
  document.getElementById('s-jail').textContent = jail;
  document.getElementById('s-travel').textContent = travel;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

function applyFilters() {
  const search = document.getElementById('searchBox').value.toLowerCase();
  const rows = document.querySelectorAll('#tableBody tr');
  rows.forEach(row => {
    const state = row.dataset.state || '';
    const name = row.dataset.name || '';
    const id = row.dataset.id || '';
    let show = true;
    if (currentFilter === 'okay' && state !== 'okay') show = false;
    if (currentFilter === 'hosp' && state !== 'hospital') show = false;
    if (currentFilter === 'jail' && state !== 'jail') show = false;
    if (currentFilter === 'travel' && !['traveling','abroad'].includes(state)) show = false;
    if (search && !name.includes(search) && !id.includes(search)) show = false;
    row.style.display = show ? '' : 'none';
  });
}

function fmtTime(secs) {
  if (secs <= 0) return '0s';
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = secs % 60;
  if (h > 0) return `${h}h ${m}m`;
  if (m > 0) return `${m}m ${s}s`;
  return `${s}s`;
}

function statusPriority(p) {
  const s = (p.statusState || '').toLowerCase();
  if (s === 'okay') return 0;
  if (s === 'hospital') return 1;
  if (s === 'jail') return 2;
  if (s === 'traveling' || s === 'abroad') return 3;
  if (s === 'federal') return 4;
  return 5; // unloaded / unknown
}

function autoSort() {
  const now = Math.floor(Date.now() / 1000);
  playerData.sort((a, b) => {
    const pa = statusPriority(a), pb = statusPriority(b);
    if (pa !== pb) return pa - pb;
    // Within hospital: sort by shortest time remaining first
    if (pa === 1) {
      const ta = a.hospitalUntil > now ? a.hospitalUntil - now : 0;
      const tb = b.hospitalUntil > now ? b.hospitalUntil - now : 0;
      return ta - tb;
    }
    // Within jail: sort by shortest time remaining first
    if (pa === 2) {
      const ta = a.jailUntil > now ? a.jailUntil - now : 0;
      const tb = b.jailUntil > now ? b.jailUntil - now : 0;
      return ta - tb;
    }
    return 0;
  });
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = playerData.map((_, i) => rowHTML(i)).join('');
  applyFilters();
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }

  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sort-asc','sort-desc');
    if (th.textContent.trim().toLowerCase().startsWith(col === 'lastAction' ? 'last' : col)) {
      th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
    }
  });

  playerData.sort((a, b) => {
    let av, bv;
    if (col === 'name') { av = a.name?.toLowerCase(); bv = b.name?.toLowerCase(); }
    else if (col === 'id') { av = a.id; bv = b.id; }
    else if (col === 'level') { av = a.level ?? -1; bv = b.level ?? -1; }
    else if (col === 'lastAction') { av = a.lastAction ?? 0; bv = b.lastAction ?? 0; }
    if (av < bv) return -sortDir;
    if (av > bv) return sortDir;
    return 0;
  });

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = playerData.map((_, i) => rowHTML(i)).join('');
  applyFilters();
}

// Init
initTable();
</script>
